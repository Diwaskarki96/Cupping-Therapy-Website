<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#051624;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b2b39;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)"/>
  <!-- Cupping cup shape -->
  <g transform="translate(256, 220)" fill="none" stroke="#e9c176" stroke-width="8" stroke-linecap="round">
    <!-- Cup body -->
    <ellipse cx="0" cy="0" rx="80" ry="30" />
    <path d="M-80,0 C-80,80 -50,120 0,120 C50,120 80,80 80,0" />
    <!-- Suction lines -->
    <line x1="-30" y1="-50" x2="-30" y2="-30" opacity="0.6"/>
    <line x1="0" y1="-60" x2="0" y2="-35" opacity="0.8"/>
    <line x1="30" y1="-50" x2="30" y2="-30" opacity="0.6"/>
  </g>
  <!-- Hands symbol -->
  <g transform="translate(256, 380)" fill="none" stroke="#d3e4f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-60,0 C-40,-20 -20,-20 0,0 C20,-20 40,-20 60,0" />
    <path d="M-45,10 C-30,-5 -15,-5 0,10 C15,-5 30,-5 45,10" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">CMT</text>
</svg>
